# Netlify build configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# Redirect www → apex (canonical URL)
[[redirects]]
  from   = "https://www.climahogarsv.com/*"
  to     = "https://climahogarsv.com/:splat"
  status = 301
  force  = true

# Fallback: HTTP → HTTPS (Netlify handles this automatically, but explicit is better)
[[redirects]]
  from   = "http://climahogarsv.com/*"
  to     = "https://climahogarsv.com/:splat"
  status = 301
  force  = true

# Thank-you page — ensure trailing slash for form action redirect
[[redirects]]
  from   = "/gracias"
  to     = "/gracias/"
  status = 301

# CD — Deploy to Production
#
# Triggered MANUALLY via GitHub Actions UI (workflow_dispatch).
# You must specify which release branch to promote (e.g. release/v1.2.0).
#
# Staging is a REQUIRED gate — production will refuse to deploy if the HEAD
# of the specified release branch has not already been deployed to staging.
#
# Flow:
#   Manual trigger (with release_branch input)
#   → verify-staging: checks GitHub Deployments API for that branch's HEAD SHA
#   → confirmed → deploy-prod targets 'production' environment
#   → GitHub PAUSES for reviewer approval → approved
#   → builds release branch → deploys to Netlify PROD
#   → auto-merges release branch into main  (production record)
#   → auto-merges release branch into dev   (brings release fixes back)
#
# Required GitHub secrets:
#   NETLIFY_AUTH_TOKEN       → Your Netlify personal access token
#   NETLIFY_SITE_ID_PROD     → Site ID of your Netlify "production" site
#   DEPLOY_APP_ID            → GitHub App ID for the deploy bot
#   DEPLOY_APP_PRIVATE_KEY   → GitHub App private key (.pem contents)
#
# Required GitHub App setup:
#   1. Create a GitHub App with Contents (rw) + Pull requests (rw) permissions
#   2. Install it on this repo
#   3. Add it as bypass actor in the rulesets for 'main' and 'dev'
#   The App token allows the workflow to push directly to protected branches.

name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch to deploy (e.g. release/v1.2.0)'
        required: true
      reason:
        description: 'Reason for promoting to production'
        required: true
        default: 'Routine release promotion'

jobs:
  # ── Gate: release branch must be deployed to staging first ────────────────
  verify-staging:
    name: Verify staging is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Check release branch HEAD is deployed to staging
        uses: actions/github-script@v7
        with:
          script: |
            const releaseBranch = '${{ inputs.release_branch }}';

            // Get HEAD SHA of the release branch
            const refData = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${releaseBranch}`,
            });
            const releaseSha = refData.data.object.sha;
            core.info(`Release branch: ${releaseBranch}`);
            core.info(`HEAD SHA: ${releaseSha}`);

            // Fetch recent staging deployments
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'staging',
              per_page: 20,
            });

            for (const deployment of deployments) {
              if (deployment.sha !== releaseSha) continue;

              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                per_page: 1,
              });

              if (statuses.length > 0 && statuses[0].state === 'success') {
                core.info(`✅ ${releaseBranch} HEAD (${releaseSha.slice(0, 7)}) is confirmed deployed to staging.`);
                return;
              }
            }

            core.setFailed(
              `❌ ${releaseBranch} HEAD (${releaseSha.slice(0, 7)}) has NOT been deployed to staging.\n` +
              `Push to the release branch (triggers auto-deploy) or run "Deploy — Staging" manually first.`
            );

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: verify-staging
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0 # full history needed for the merge steps
          persist-credentials: false # we provide our own token via the GitHub App

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Netlify (Production)
        id: deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production — ${{ inputs.release_branch }} @ ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}

      # Generate a token from the GitHub App — this token can bypass branch
      # protection rules because the App is listed as a bypass actor.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}

      # Merge release branch → main (production record)
      # Merge release branch → dev  (bring release fixes back to integration)
      - name: Sync main and dev with release branch
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "clima-hogar-deploy-bot[bot]"
          git config user.email "clima-hogar-deploy-bot[bot]@users.noreply.github.com"

          RELEASE="${{ inputs.release_branch }}"
          REMOTE="https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"

          git checkout main
          git merge "$RELEASE" --no-ff -m "chore: merge $RELEASE into main after production deploy"
          git push "$REMOTE" main

          git checkout dev
          git merge "$RELEASE" --no-ff -m "chore: merge $RELEASE back into dev after production deploy"
          git push "$REMOTE" dev

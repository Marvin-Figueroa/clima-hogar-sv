# CD — Deploy to Staging environment
#
# Triggered automatically when code is pushed to any 'release/*' branch.
# Also triggerable manually for flexibility.
#
# In the release-branch flow, 'release/*' is the validation branch — every
# commit there (features + fixes) auto-deploys here so the team sees the
# latest state of the release at all times.
#
# Flow (auto):
#   push to release/* → deploy to Netlify STAGING (no approval needed)
#
# Flow (manual):
#   workflow_dispatch with release_branch input → deploy that branch to STAGING
#
# Required GitHub secrets:
#   NETLIFY_AUTH_TOKEN         → Your Netlify personal access token
#   NETLIFY_SITE_ID_STAGING    → Site ID of your Netlify "staging" site
#
# Required GitHub Environment setup (repo Settings → Environments):
#   1. Create environment named exactly: staging
#   2. No required reviewers needed — staging is a validation environment,
#      not a protected one. Speed matters here.

name: Deploy — Staging

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch to deploy (e.g. release/v1.2.0)'
        required: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Resolve release branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.release_branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Netlify (Staging)
        id: deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Staging — ${{ steps.branch.outputs.ref }} @ ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_STAGING }}

# CI — runs on every PR targeting 'dev', 'release/*', or 'main'
#
# Jobs:
#   lint        → ESLint checks across all .astro, .ts, .js files
#   format      → Prettier format verification (no auto-fix, just fails if not formatted)
#   build       → Astro production build (catches compile errors early)
#
# All jobs run in parallel. A PR cannot be merged until all three pass.

name: CI

on:
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main

jobs:
  # ── Linting ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Format check ───────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting with Prettier
        run: npm run format:check

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

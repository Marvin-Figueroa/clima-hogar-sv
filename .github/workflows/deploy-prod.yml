# CD — Deploy to Production
#
# Triggered MANUALLY via GitHub Actions UI (workflow_dispatch).
# This is the "promotion gate" from dev → production.
#
# Flow:
#   Manual trigger → GitHub PAUSES for reviewer approval (production environment)
#   → approved → builds latest 'dev' branch → deploys to Netlify PROD
#   → auto-merges dev into main as a release record
#
# Required GitHub secrets:
#   NETLIFY_AUTH_TOKEN      → Your Netlify personal access token
#   NETLIFY_SITE_ID_PROD    → Site ID of your Netlify "production" site
#
# Required GitHub Environment setup (repo Settings → Environments):
#   1. Create environment named exactly: production
#   2. Add "Required reviewers" — add yourself or your team
#   3. Remove any branch restriction (no longer needs to be restricted to main)
#
# Required repo setting:
#   → Settings → Actions → General → Workflow permissions → "Read and write permissions"
#   This allows the auto-merge step to push to main on your behalf.

name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for promoting to production'
        required: true
        default: 'Routine promotion from dev'

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Targets the 'production' GitHub Environment.
    # Required reviewers here means: someone must click "Approve" in GitHub
    # before this job executes.
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev # always promotes from dev
          fetch-depth: 0 # full history needed for the merge step

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Netlify (Production)
        id: deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-deploy: true # marks as production deploy in Netlify
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production deploy — ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}

      # After a successful deploy, sync main with dev so it always
      # reflects exactly what is live in production.
      - name: Sync main with dev (release record)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge dev --ff-only
          git push origin main

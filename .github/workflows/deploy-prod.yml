# CD — Deploy to Production
#
# Triggered automatically when code is merged (pushed) to 'main'.
# The actual deploy step PAUSES and requires manual approval before running,
# thanks to the 'production' GitHub Environment protection rule.
#
# Flow:
#   merge PR into main → workflow starts → deploy-prod job targets 'production'
#   environment → GitHub PAUSES for reviewer approval → approved → deploys to Netlify PROD
#
# Required GitHub secrets:
#   NETLIFY_AUTH_TOKEN      → Your Netlify personal access token
#   NETLIFY_SITE_ID_PROD    → Site ID of your Netlify "production" site
#
# Required GitHub Environment setup (repo Settings → Environments):
#   1. Create environment named exactly: production
#   2. Add "Required reviewers" — add yourself or your team
#   3. Restrict deployments to the 'main' branch only

name: Deploy — Production

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Targets the 'production' GitHub Environment.
    # Required reviewers here means: someone must click "Approve" in GitHub
    # before this job executes.
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Netlify (Production)
        id: deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-deploy: true # marks as production deploy in Netlify
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production deploy — ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_PROD }}

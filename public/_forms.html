<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
</head>

<body>
    <!--
      Static form declaration for Netlify's form detection bot.
      This file is never shown to users — it only registers the form fields
      so Netlify can detect them at deploy time.
      All field names must match exactly those in QuoteForm.astro.
    -->
    <form name="cotizacion" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="bot-field" />
        <input type="text" name="nombre" />
        <input type="tel" name="telefono" />
        <select name="servicio"></select>
        <input type="text" name="marca_modelo" />
        <input type="text" name="capacidad" />
        <input type="text" name="tipo_instalacion" />
        <input type="text" name="cantidad" />
        <textarea name="descripcion"></textarea>
    </form>
</body>

</html>
